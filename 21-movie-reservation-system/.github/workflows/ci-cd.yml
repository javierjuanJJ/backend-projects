name: CI/CD — Movie Reservation API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ============================================================
  # JOB 1: Lint + Type check
  # ============================================================
  lint:
    name: 🔍 Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ============================================================
  # JOB 2: Tests unitarios e integración
  # ============================================================
  test:
    name: 🧪 Tests (Vitest + Supertest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: movie_reservation_test
          MYSQL_USER: movie_user
          MYSQL_PASSWORD: movie_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -umovie_user -pmovie_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://movie_user:movie_pass@localhost:3306/movie_reservation_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test_access_secret_very_long
      JWT_REFRESH_SECRET: test_refresh_secret_very_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Prisma migrations (test DB)
        run: pnpm prisma migrate deploy

      - name: Seed test database
        run: pnpm prisma db seed

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ============================================================
  # JOB 3: Build Docker image
  # ============================================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}

  # ============================================================
  # JOB 4: Deploy a Cubepath (solo en main)
  # ============================================================
  deploy:
    name: 🚀 Deploy a Cubepath
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.CUBEPATH_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CUBEPATH_SSH_KEY }}

      - name: Add Cubepath host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.CUBEPATH_HOST }} >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Create Ansible inventory
        run: |
          cat > ansible/inventory.ini << EOF
          [cubepath]
          ${{ secrets.CUBEPATH_HOST }} ansible_user=${{ secrets.CUBEPATH_USER }} ansible_port=22
          EOF

      - name: Create Ansible vars file
        run: |
          cat > ansible/vars_ci.yml << EOF
          image_tag: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          app_env: production
          port: 3000
          database_url: "${{ secrets.DATABASE_URL }}"
          jwt_access_secret: "${{ secrets.JWT_ACCESS_SECRET }}"
          jwt_refresh_secret: "${{ secrets.JWT_REFRESH_SECRET }}"
          sendgrid_api_key: "${{ secrets.SENDGRID_API_KEY }}"
          stripe_secret_key: "${{ secrets.STRIPE_SECRET_KEY }}"
          twilio_account_sid: "${{ secrets.TWILIO_ACCOUNT_SID }}"
          twilio_auth_token: "${{ secrets.TWILIO_AUTH_TOKEN }}"
          redis_url: "${{ secrets.REDIS_URL }}"
          EOF

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            -e @ansible/vars_ci.yml \
            ansible/playbook.yml \
            --tags deploy

      - name: Verify deployment health
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 \
            ${{ secrets.CUBEPATH_APP_URL }}/api/health || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful: ${{ secrets.CUBEPATH_APP_URL }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
          exit 1

  # ============================================================
  # JOB 5: Notificación PR (solo en pull_request)
  # ============================================================
  pr-check:
    name: ✅ PR Check Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    steps:
      - name: PR passed all checks
        run: echo "✅ All checks passed. Ready to merge."
