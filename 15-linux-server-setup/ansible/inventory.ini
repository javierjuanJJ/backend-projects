# ─────────────────────────────────────────────────────────────────────────────
# Ansible Inventory — Ubuntu Server Initial Setup
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   1. Replace the placeholder values with your actual server details.
#   2. Run: ansible-playbook -i inventory.ini playbook.yml
#
# For multiple servers, add them under [ubuntu_servers]:
#   web01 ansible_host=10.0.0.1
#   web02 ansible_host=10.0.0.2
# ─────────────────────────────────────────────────────────────────────────────

[ubuntu_servers]
myserver ansible_host=YOUR_SERVER_IP

[ubuntu_servers:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
