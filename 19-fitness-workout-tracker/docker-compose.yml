version: "3.9"

# ============================================================
# Workout Tracker — Docker Compose (Desarrollo)
# Uso: docker compose up
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: workout_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-workout_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-workout_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workout_net

  # ── API (Next.js + Express) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: workout_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-workout_tracker}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate dev --name init && pnpm prisma db seed && pnpm dev"
    networks:
      - workout_net

  # ── Adminer (opcional, UI para PostgreSQL) ──────────────
  adminer:
    image: adminer:latest
    container_name: workout_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - workout_net

volumes:
  postgres_data:
    driver: local

networks:
  workout_net:
    driver: bridge
