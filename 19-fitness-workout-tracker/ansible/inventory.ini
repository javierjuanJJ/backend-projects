# ============================================================
# Ansible Inventory — Workout Tracker
# Este archivo es generado dinámicamente en GitHub Actions.
# Para uso local, rellena con los datos reales de tu servidor.
# ============================================================

[cubepath]
# Reemplaza con la IP o dominio de tu servidor Cubepath
# workout.cubepath.io ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[cubepath:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
