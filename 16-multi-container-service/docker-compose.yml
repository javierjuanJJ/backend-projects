services:

  # ── 1. MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: project_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE:      todosdb
    volumes:
      - mongo_data:/data/db      # datos persistentes
    networks:
      - backend
    healthcheck:
      test:     ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── 2. API Express + Mongoose ─────────────────────────────────────────────────
  api:
    build:
      context:    ./api
      dockerfile: Dockerfile
    container_name: project_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT:      4000
      NODE_ENV:  production
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongo:27017/todosdb?authSource=admin
    networks:
      - backend
      - frontend
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ── 3. Caching Proxy ──────────────────────────────────────────────────────────
  proxy:
    build:
      context:    ./proxy
      dockerfile: Dockerfile
    container_name: project_proxy
    restart: unless-stopped
    environment:
      PORT:    3000
      TARGET:  https://jsonplaceholder.typicode.com   # cambia al destino que necesites
      TTL_MS:  60000
    networks:
      - frontend
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ── 4. Nginx (reverse proxy unificado) ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: project_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      proxy:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend

# ─── Volúmenes ────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ─── Redes ────────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge   # mongo ↔ api  (aislada del exterior)
  frontend:
    driver: bridge   # api ↔ proxy ↔ nginx
