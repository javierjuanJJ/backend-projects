services:
  # ─────────────────────────────────────────────
  # Next.js / Express API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: image_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-7d}
      RABBITMQ_URL:           amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      UPLOAD_DIR:             /app/uploads
      CACHE_DIR:              /app/cache
      MAX_FILE_SIZE_MB:       ${MAX_FILE_SIZE_MB:-10}
      RATE_LIMIT_WINDOW_MS:   ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX:         ${RATE_LIMIT_MAX:-20}
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET}
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-}
      BASE_URL:               ${BASE_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
      - cache_data:/app/cache
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 40s

  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: image_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-pguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-imageapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pguser} -d ${POSTGRES_DB:-imageapi}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─────────────────────────────────────────────
  # RabbitMQ 3.13
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: image_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"   # Remove in production
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app_net
    healthcheck:
      test:     ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ─────────────────────────────────────────────
  # Nginx reverse proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: image_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
      - cache_data:/var/www/cache:ro
    depends_on:
      - api
    networks:
      - app_net

volumes:
  postgres_data:
  rabbitmq_data:
  uploads_data:
  cache_data:

networks:
  app_net:
    driver: bridge
