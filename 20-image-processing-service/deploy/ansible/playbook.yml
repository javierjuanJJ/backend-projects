---
# deploy/ansible/playbook.yml
# Usage: ansible-playbook deploy/ansible/playbook.yml -i deploy/ansible/inventory.ini --ask-vault-pass

- name: Deploy Image Processing API
  hosts: app_servers
  become: true

  vars:
    app_dir:  /opt/image-processing-api
    app_user: imageapi
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"

  vars_files:
    - vars/secrets.yml   # ansible-vault encrypted file

  tasks:
    # ── System ────────────────────────────────────────────────────────────────
    - name: Install system packages
      apt:
        name: [curl, git, ca-certificates, gnupg, ufw]
        state: present
        update_cache: true

    # ── Docker ────────────────────────────────────────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

    - name: Install Docker Engine
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        update_cache: true

    - name: Enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    # ── App user ──────────────────────────────────────────────────────────────
    - name: Create app user
      user:
        name: "{{ app_user }}"
        groups: docker
        append: true

    # ── Directories ───────────────────────────────────────────────────────────
    - name: Create app directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/uploads"
        - "{{ app_dir }}/cache"
        - "{{ app_dir }}/nginx/conf.d"

    # ── Config files ──────────────────────────────────────────────────────────
    - name: Deploy .env file
      template:
        src:   templates/env.j2
        dest:  "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        mode:  "0600"
      notify: Restart API

    - name: Deploy docker-compose.yml
      copy:
        src:   ../../docker-compose.yml
        dest:  "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
      notify: Restart API

    - name: Deploy nginx config
      copy:
        src:   ../../nginx/conf.d/default.conf
        dest:  "{{ app_dir }}/nginx/conf.d/default.conf"
      notify: Reload nginx

    # ── Deploy ────────────────────────────────────────────────────────────────
    - name: Login to GHCR
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_token }}"

    - name: Pull and start services
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        state: present
        remove_orphans: true
      become_user: "{{ app_user }}"

    - name: Run database migrations
      community.docker.docker_container_exec:
        container: image_api
        command: pnpm prisma:deploy

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: Allow SSH, HTTP, HTTPS
      ufw:
        rule: allow
        port: "{{ item }}"
      loop: ["22", "80", "443"]

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    # ── Health check ──────────────────────────────────────────────────────────
    - name: Wait for healthy API
      uri:
        url:         "http://localhost/api/health"
        status_code: 200
      retries: 10
      delay:   10
      register: result
      until:    result.status == 200

  handlers:
    - name: Restart API
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        recreate: always
      become_user: "{{ app_user }}"

    - name: Reload nginx
      community.docker.docker_container_exec:
        container: image_nginx
        command: nginx -s reload
